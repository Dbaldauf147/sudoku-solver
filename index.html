<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sudoku Solver</title>
    <style>
      :root {
        --bg: #0f1117;
        --panel: #171a23;
        --line: #2b2f3a;
        --thick: #5b6478;
        --text: #e6e8ee;
        --muted: #9aa0ad;
        --accent: #6ea8fe;
        --given: #e6e8ee;
        --solved: #6ea8fe;
        --bad: #ff6b6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        padding: 32px 16px;
      }
      main { width: 100%; max-width: 520px; }
      h1 { font-size: 1.5rem; margin: 0 0 4px; }
      p.sub { color: var(--muted); margin: 0 0 24px; line-height: 1.5; }
      .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
      button, label.file {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 0.95rem;
        cursor: pointer;
      }
      button.primary { background: var(--accent); border-color: var(--accent); color: #0b1020; font-weight: 600; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      label.file input { display: none; }
      .status { min-height: 20px; color: var(--muted); margin-bottom: 16px; font-size: 0.9rem; }
      .status.error { color: var(--bad); }
      .board {
        display: grid;
        grid-template-columns: repeat(9, 1fr);
        aspect-ratio: 1;
        background: var(--thick);
        border: 2px solid var(--thick);
        gap: 1px;
        border-radius: 6px;
        overflow: hidden;
      }
      .cell {
        background: var(--panel);
        border: none;
        color: var(--given);
        font-size: clamp(1rem, 5vw, 1.6rem);
        text-align: center;
        width: 100%;
        height: 100%;
        outline: none;
      }
      .cell:focus { background: #1f2430; }
      .cell.solved { color: var(--solved); }
      /* Thicker separators between 3x3 boxes */
      .cell[data-col="2"], .cell[data-col="5"] { box-shadow: inset -2px 0 0 var(--thick); }
      .cell[data-row="2"], .cell[data-row="5"] { box-shadow: inset 0 -2px 0 var(--thick); }
      .cell[data-col="2"][data-row="2"], .cell[data-col="2"][data-row="5"],
      .cell[data-col="5"][data-row="2"], .cell[data-col="5"][data-row="5"] {
        box-shadow: inset -2px 0 0 var(--thick), inset 0 -2px 0 var(--thick);
      }
      footer { margin-top: 20px; color: var(--muted); font-size: 0.8rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>Sudoku Solver</h1>
      <p class="sub">
        Import a screenshot of a Sudoku puzzle — Claude Vision reads the grid,
        you fix any misreads, and a backtracking solver finishes it.
      </p>

      <div class="controls">
        <label class="file">
          Import screenshot
          <input id="file" type="file" accept="image/*" />
        </label>
        <button id="solve" class="primary">Solve</button>
        <button id="clear">Clear</button>
      </div>

      <div id="status" class="status"></div>
      <div id="board" class="board"></div>

      <footer>Edit any cell before solving to correct a misread.</footer>
    </main>

    <script>
      const boardEl = document.getElementById("board");
      const statusEl = document.getElementById("status");
      const cells = [];

      // Build the 9x9 grid of inputs.
      for (let r = 0; r < 9; r++) {
        cells[r] = [];
        for (let c = 0; c < 9; c++) {
          const input = document.createElement("input");
          input.className = "cell";
          input.inputMode = "numeric";
          input.maxLength = 1;
          input.dataset.row = r;
          input.dataset.col = c;
          input.addEventListener("input", () => {
            input.value = input.value.replace(/[^1-9]/g, "").slice(0, 1);
            input.classList.remove("solved");
          });
          boardEl.appendChild(input);
          cells[r][c] = input;
        }
      }

      function setStatus(msg, isError = false) {
        statusEl.textContent = msg;
        statusEl.classList.toggle("error", isError);
      }

      function readGrid() {
        return cells.map((row) =>
          row.map((cell) => (cell.value ? Number(cell.value) : 0))
        );
      }

      function writeGrid(grid, markSolved = false) {
        for (let r = 0; r < 9; r++) {
          for (let c = 0; c < 9; c++) {
            const v = grid[r][c];
            const wasEmpty = !cells[r][c].value;
            cells[r][c].value = v ? String(v) : "";
            cells[r][c].classList.toggle("solved", markSolved && wasEmpty && !!v);
          }
        }
      }

      // --- Backtracking solver ---
      function isValid(grid, r, c, n) {
        for (let i = 0; i < 9; i++) {
          if (grid[r][i] === n || grid[i][c] === n) return false;
        }
        const br = Math.floor(r / 3) * 3;
        const bc = Math.floor(c / 3) * 3;
        for (let i = 0; i < 3; i++) {
          for (let j = 0; j < 3; j++) {
            if (grid[br + i][bc + j] === n) return false;
          }
        }
        return true;
      }

      function hasValidStart(grid) {
        for (let r = 0; r < 9; r++) {
          for (let c = 0; c < 9; c++) {
            const n = grid[r][c];
            if (n) {
              grid[r][c] = 0;
              const ok = isValid(grid, r, c, n);
              grid[r][c] = n;
              if (!ok) return false;
            }
          }
        }
        return true;
      }

      function solve(grid) {
        for (let r = 0; r < 9; r++) {
          for (let c = 0; c < 9; c++) {
            if (grid[r][c] === 0) {
              for (let n = 1; n <= 9; n++) {
                if (isValid(grid, r, c, n)) {
                  grid[r][c] = n;
                  if (solve(grid)) return true;
                  grid[r][c] = 0;
                }
              }
              return false;
            }
          }
        }
        return true;
      }

      document.getElementById("solve").addEventListener("click", () => {
        const grid = readGrid();
        if (!hasValidStart(grid)) {
          setStatus("The grid has a conflict (duplicate in a row, column, or box). Fix it and try again.", true);
          return;
        }
        if (solve(grid)) {
          writeGrid(grid, true);
          setStatus("Solved.");
        } else {
          setStatus("No solution exists for this grid.", true);
        }
      });

      document.getElementById("clear").addEventListener("click", () => {
        for (const row of cells) for (const cell of row) {
          cell.value = "";
          cell.classList.remove("solved");
        }
        setStatus("");
      });

      // --- Image import → Claude Vision ---
      document.getElementById("file").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setStatus("Reading puzzle with Claude Vision…");

        try {
          const dataUrl = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
          const base64 = String(dataUrl).split(",")[1];

          const res = await fetch("/api/parse-sudoku-image", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: base64, media_type: file.type || "image/png" }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Failed to read image");

          writeGrid(data.grid);
          setStatus("Grid imported. Check for misreads, then press Solve.");
        } catch (err) {
          setStatus(err.message || "Could not read the image.", true);
        } finally {
          e.target.value = "";
        }
      });
    </script>
  </body>
</html>
